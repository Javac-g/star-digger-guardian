<!DOCTYPE html>
<html>
<head>
  <title>Blocked Star Diggers</title>
</head>
<body>
  <h1>Blocked Star Diggers</h1>
  <ul id="list"></ul>

  <script>
    fetch('blocked-users.json')
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById('list');
        data.forEach(user => {
          const li = document.createElement('li');
          li.textContent = user.login + " — blocked at " + user.blocked_at;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
